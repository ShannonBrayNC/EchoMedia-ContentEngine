name: Canon Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate-canon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate Canon Manifests
        run: |
          set -e
          MANIFESTS=$(find . -name "canon-manifest.json" -o -name "example-canon-manifest.json")
          if [ -z "$MANIFESTS" ]; then
            echo "No canon manifests found. Skipping canon validation."
            exit 0
          fi
          for manifest in $MANIFESTS; do
            echo "Validating $manifest"
            python services/canon-validator/validate_canon.py "$manifest" --report "reports/canon-validation-$(basename "$manifest").json"
          done
