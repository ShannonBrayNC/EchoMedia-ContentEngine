    relative_order: 700
    canon_status: canon-draft
    event_type: continuity-marker
    summary: >-
      Lantern Protocol Case Files preserve the Living Anchor concept through
      case material and witness records.
    affected_entities:
      - lantern
      - living-anchor
    depends_on:
      - voss-living-anchor-revelation
    blocks_or_constrains: []
    continuity_notes:
      - Case file layer should not erase series autonomy.
    producer_review_required: true
    risk_flags:
      - mythology-impact
