        preserve:
          - story compression motif
      - chapter: 9
        title: The First Lost Ally
        add:
          - prior Marcus friendship memory before present loss
          - a sharper but restrained call ending
        preserve:
          - loss without villainizing Marcus
      - chapter: 10
        title: The Kindness That Cuts
        add:
          - Lena's relationship context
          - stronger soup-as-ambiguous-care motif
        preserve:
          - care and harm together
      - chapter: 11
