sprint: SB-006A
book_id: book-01-silver-bullet
source_pass: SB-006
status: active-expansion-plan
expansion_goal: >-
  Expand the concise structural prose draft into fuller novel-length chapters
  while preserving SB-004/SB-005 architecture and SB-007 Producer Review constraints.
chapter_targets:
  - act: I
    act_name: The Shot
    chapters: 1-6
    expansion_focus:
      - establish Jack's ordinary life before rupture
      - add richer sensory baseline
      - deepen early relationship context
      - make the first wrong notes subtle but unmistakable
    target_changes:
      - chapter: 1
        title: The Good Day That Should Have Held
        add:
          - fuller work scene showing technical competence
          - one warm social baseline interaction
          - clearer body-management routine
        preserve:
          - normalcy as worth losing
          - record habit as foreshadowing
      - chapter: 2
        title: The First Wrong Note
        add:
          - stronger contrast between normal pause and threatening pause
          - one external detail that later repeats
        preserve:
          - ambiguity before confirmation
      - chapter: 3
        title: The Message That Changes the Room
        add:
          - embodied reaction before analysis
          - stronger invented specificity around Evelyn's fictional voice
        preserve:
          - message as arrangement, not blunt accusation
      - chapter: 4
        title: Context Becomes Fragile
        add:
          - longer dialogue showing how truth slows down
          - Jack's first deliberate timeline method
        preserve:
          - context as fragile and costly
      - chapter: 5
        title: The Circle at the Edge
        add:
          - richer social setting
          - repeated language from multiple directions
        preserve:
          - Widow Circle as atmosphere, not exposition
      - chapter: 6
        title: The Shot Lands
        add:
          - concrete practical consequence
          - stronger Act I closing dread
        preserve:
          - first hard contradiction

  - act: II
