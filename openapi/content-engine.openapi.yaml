openapi: 3.1.0
info:
  title: EchoMedia Content Engine API
  version: 1.0.0-draft
  description: API contract for project registry, generation jobs, review gates, artifacts, providers, workers, and exports.
servers:
  - url: http://127.0.0.1:8080
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /config/runtime:
    get:
      summary: Runtime configuration visible to clients
      responses:
        '200':
          description: Safe runtime configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfig'
  /projects:
    get:
      summary: List registered projects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectSummary'
  /projects/{projectId}:
    get:
      summary: Get project detail
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '404':
          $ref: '#/components/responses/Error'
  /projects/{projectId}/artifacts:
    get:
      summary: List project artifacts
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Artifact list
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArtifactSummary'
  /schemas:
    get:
      summary: List available schemas
      responses:
        '200':
          description: Schema list
          content:
            application/json:
              schema:
                type: object
                properties:
                  schemas:
                    type: array
                    items:
                      type: string
  /export-profiles:
    get:
      summary: List export profiles
      responses:
        '200':
          description: Export profile list
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExportProfileSummary'
  /providers/capabilities:
    get:
      summary: List provider capabilities without exposing secrets
      responses:
        '200':
          description: Provider capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProviderCapability'
  /generation/jobs:
    post:
      summary: Create a generation job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGenerationJobRequest'
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
        '400':
          $ref: '#/components/responses/Error'
  /generation/jobs/{jobId}:
    get:
      summary: Get generation job status
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
        '404':
          $ref: '#/components/responses/Error'
  /generation/jobs/{jobId}/cancel:
    post:
      summary: Cancel a generation job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '202':
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
  /generation/jobs/{jobId}/retry:
    post:
      summary: Retry a failed generation job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '202':
          description: Retry requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
  /reviews/{artifactId}/approve:
    post:
      summary: Approve a draft or review artifact
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewDecision'
      responses:
        '200':
          description: Artifact approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactSummary'
  /reviews/{artifactId}/reject:
    post:
      summary: Reject a draft or review artifact
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewDecision'
      responses:
        '200':
          description: Artifact rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactSummary'
  /artifacts/{artifactId}:
    get:
      summary: Get artifact metadata
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
      responses:
        '200':
          description: Artifact detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactSummary'
        '404':
          $ref: '#/components/responses/Error'
  /manifests/{manifestId}:
    get:
      summary: Get generated asset manifest
      parameters:
        - name: manifestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Manifest detail placeholder
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /exports/packages:
    post:
      summary: Create export package request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExportPackageRequest'
      responses:
        '202':
          description: Export accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
  /workers/capabilities:
    get:
      summary: List worker capabilities
      responses:
        '200':
          description: Worker capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  workers:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkerCapability'
  /workers/jobs/{workerJobId}:
    get:
      summary: Get worker job state
      parameters:
        - name: workerJobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Worker job state
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
        version:
          type: string
    RuntimeConfig:
      type: object
      properties:
        environment:
          type: string
        noProviderMode:
          type: boolean
        liveProvidersEnabled:
          type: boolean
        dryRunProviders:
          type: boolean
    ProjectSummary:
      type: object
      required: [projectId, displayTitle]
      properties:
        projectId:
          type: string
        displayTitle:
          type: string
        status:
          type: string
        rootPath:
          type: string
    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/ProjectSummary'
        - type: object
          properties:
            supportedGenerationTypes:
              type: array
              items:
                type: string
            exportTargets:
              type: array
              items:
                type: string
    ArtifactSummary:
      type: object
      required: [artifactId, projectId, artifactType, state]
      properties:
        artifactId:
          type: string
        projectId:
          type: string
        artifactType:
          type: string
        state:
          type: string
        path:
          type: string
        manifestId:
          type: string
    ExportProfileSummary:
      type: object
      required: [profileId, provider]
      properties:
        profileId:
          type: string
        provider:
          type: string
        artifactTypes:
          type: array
          items:
            type: string
    ProviderCapability:
      type: object
      required: [provider, enabled]
      properties:
        provider:
          type: string
        enabled:
          type: boolean
        configured:
          type: boolean
        liveUseAllowed:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
    WorkerCapability:
      type: object
      required: [workerId, online]
      properties:
        workerId:
          type: string
        online:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
    CreateGenerationJobRequest:
      type: object
      required: [projectId, artifactType]
      properties:
        projectId:
          type: string
        artifactType:
          type: string
        sourceRefs:
          type: array
          items:
            type: object
            additionalProperties: true
        userDirection:
          type: string
        templateId:
          type: string
        exportProfileId:
          type: string
        dryRun:
          type: boolean
    CreateExportPackageRequest:
      type: object
      required: [projectId, packageType]
      properties:
        projectId:
          type: string
        packageType:
          type: string
        artifactIds:
          type: array
          items:
            type: string
        exportProfileId:
          type: string
    GenerationJob:
      type: object
      required: [jobId, projectId, artifactType, status]
      properties:
        jobId:
          type: string
        projectId:
          type: string
        artifactType:
          type: string
        status:
          type: string
          enum: [draft-request, queued, generating, generated, needs-review, approved, exported, failed, cancelled, superseded]
        progress:
          type: number
        artifactIds:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        error:
          $ref: '#/components/schemas/ErrorDetail'
        correlationId:
          type: string
    ReviewDecision:
      type: object
      properties:
        reviewer:
          type: string
        notes:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        correlationId:
          type: string
